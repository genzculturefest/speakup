<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KF+ | Agregator Berita</title>
    <style>
        :root { --red: #ed1c24; --blue: #00aeef; --bg: #0f0f0f; --card: #1e1e1e; --text: #b0b0b0; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        nav { display: flex; justify-content: space-between; padding: 15px 5%; background: #000; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 24px; font-weight: 900; cursor: pointer; }
        .logo span { color: var(--red); }
        .logo i { color: var(--blue); font-style: normal; }
        .menu { display: flex; gap: 20px; }
        .menu a { color: var(--text); text-decoration: none; font-size: 13px; font-weight: 700; cursor: pointer; }
        .menu a.active { color: white; border-bottom: 2px solid var(--red); padding-bottom: 5px; }
        .container { padding: 30px 5%; min-height: 100vh; }
        .page { display: none; }
        .page.active { display: block; }
        h2 { border-left: 5px solid var(--red); padding-left: 15px; margin-bottom: 25px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid #333; transition: 0.3s; cursor: pointer; }
        .card:hover { transform: translateY(-5px); border-color: var(--blue); }
        .status-box { text-align: center; padding: 50px; color: var(--text); grid-column: 1/-1; }
        .btn-retry { background: var(--red); color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <nav>
        <div class="logo" onclick="showPage('home')">KF<span>+</span><i>!</i></div>
        <div class="menu">
            <a onclick="showPage('home')" id="btn-home" class="active">HOME</a>
            <a onclick="showPage('news')" id="btn-news">NEWS+</a>
            <a onclick="showPage('games')" id="btn-games">GAMES+</a>
            <a onclick="showPage('shop')" id="btn-shop">SHOP+</a>
            <a onclick="showPage('film')" id="btn-film">FILM+</a>
        </div>
    </nav>

    <div class="container">
        <section id="home" class="page active">
            <div style="background: linear-gradient(135deg, var(--red), var(--blue)); padding: 60px; border-radius: 20px; text-align: center;">
                <h1>KF+ Super-App</h1>
                <p>Halo Mahasiswa Global Institute! Selamat datang kembali.</p>
            </div>
        </section>

        <section id="news" class="page">
            <h2>Berita Terkini (Antara News)</h2>
            <div id="news-feed" class="grid">
                <div class="status-box">Menghubungkan ke jalur berita...</div>
            </div>
        </section>

        <section id="games" class="page"><h2>Games+</h2><p>Coming Soon.</p></section>
        <section id="shop" class="page"><h2>Shop+</h2><p>Produk pilihan mahasiswa.</p></section>
        <section id="film" class="page"><h2>Film+</h2><p>Dokumenter Baduy dan tugas lainnya.</p></section>
    </div>

    <script>
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.menu a').forEach(a => a.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active');
            if(id === 'news') fetchSmartNews();
        }

        async function fetchSmartNews() {
            const feed = document.getElementById('news-feed');
            feed.innerHTML = '<div class="status-box">Sedang mencoba beberapa jalur koneksi...</div>';

            const target = 'https://www.antaranews.com/rss/terpopuler.xml';
            
            // Urutan jalur cadangan
            const proxies = [
                { 
                    url: `https://api.allorigins.win/get?url=${encodeURIComponent(target)}&_=${Date.now()}`,
                    isWrapped: true 
                },
                { 
                    url: `https://corsproxy.io/?${encodeURIComponent(target)}`,
                    isWrapped: false 
                }
            ];

            for (const proxy of proxies) {
                try {
                    const response = await fetch(proxy.url);
                    if (!response.ok) throw new Error();

                    let xmlText;
                    if (proxy.isWrapped) {
                        const json = await response.json();
                        xmlText = json.contents; // Sesuai logika .contents yang kamu gunakan
                    } else {
                        xmlText = await response.text();
                    }

                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(xmlText, "text/xml");
                    const items = xmlDoc.querySelectorAll("item");

                    if (items.length > 0) {
                        feed.innerHTML = "";
                        items.forEach((item, i) => {
                            if (i < 9) {
                                const title = item.querySelector("title").textContent;
                                const link = item.querySelector("link").textContent;
                                feed.innerHTML += `
                                    <div class="card" onclick="window.open('${link}', '_blank')">
                                        <small style="color:var(--blue)">ANTARA NEWS</small>
                                        <h3 style="margin-top:10px;">${title}</h3>
                                    </div>`;
                            }
                        });
                        return; // BERHASIL! Keluar dari loop.
                    }
                } catch (e) {
                    console.warn("Proxy gagal, mencoba jalur cadangan...");
                }
            }

            // JIKA SEMUA GAGAL
            feed.innerHTML = `
                <div class="status-box">
                    <p>Waduh, semua jalur sedang macet (Error 520/522).</p>
                    <button class="btn-retry" onclick="fetchSmartNews()">MUAT ULANG</button>
                </div>`;
        }
    </script>
</body>
</html>
