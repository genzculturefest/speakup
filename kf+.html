<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KF+ | Super-App Agregator</title>
    <style>
        :root { --red: #ed1c24; --blue: #00aeef; --bg: #0f0f0f; --card: #1e1e1e; --gray: #b0b0b0; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        
        /* NAVBAR */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: #000; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 24px; font-weight: 900; cursor: pointer; }
        .logo span { color: var(--red); }
        .logo i { color: var(--blue); font-style: normal; }
        .menu { display: flex; gap: 20px; }
        .menu a { color: var(--gray); text-decoration: none; font-size: 13px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .menu a.active { color: white; border-bottom: 2px solid var(--red); padding-bottom: 5px; }

        /* CONTENT */
        .container { padding: 30px 5%; min-height: 100vh; }
        .page { display: none; }
        .page.active { display: block; }
        h2 { border-left: 5px solid var(--red); padding-left: 15px; margin-bottom: 25px; font-size: 22px; }
        
        /* NEWS GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid #333; transition: 0.3s; cursor: pointer; }
        .card:hover { transform: translateY(-5px); border-color: var(--blue); }
        .card h3 { font-size: 15px; margin: 0; line-height: 1.4; }
        
        .status-box { text-align: center; padding: 60px 20px; color: var(--gray); grid-column: 1/-1; }
        .btn-retry { background: var(--red); color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo" onclick="showPage('home')">KF<span>+</span><i>!</i></div>
        <div class="menu">
            <a onclick="showPage('home')" id="m-home" class="active">HOME</a>
            <a onclick="showPage('news')" id="m-news">NEWS+</a>
            <a onclick="showPage('games')" id="m-games">GAMES+</a>
            <a onclick="showPage('shop')" id="m-shop">SHOP+</a>
            <a onclick="showPage('film')" id="m-film">FILM+</a>
        </div>
    </nav>

    <div class="container">
        <section id="home" class="page active">
            <div style="background: linear-gradient(135deg, var(--red), var(--blue)); padding: 60px; border-radius: 20px; text-align: center;">
                <h1>KF+ Agregator</h1>
                <p>Portal Informasi Mahasiswa Global Institute</p>
            </div>
        </section>

        <section id="news" class="page">
            <h2>Berita Terkini (Antara News)</h2>
            <div id="news-feed" class="grid">
                <div class="status-box">Menghubungkan ke jalur tercepat...</div>
            </div>
        </section>

        <section id="games" class="page"><h2>Games+</h2><p>Segera Hadir.</p></section>
        <section id="shop" class="page"><h2>Shop+</h2><p>Cari kebutuhan kuliahmu.</p></section>
        <section id="film" class="page"><h2>Film+</h2><p>Katalog Dokumenter Baduy.</p></section>
    </div>

    <script>
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.menu a').forEach(a => a.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('m-' + id).classList.add('active');
            if(id === 'news') smartFetch();
        }

        async function smartFetch() {
            const feed = document.getElementById('news-feed');
            feed.innerHTML = '<div class="status-box">Mencoba beberapa jalur proxy...</div>';

            const rss = "https://www.antaranews.com/rss/terpopuler.xml";
            
            // Strategi Multi-Proxy untuk menghindari error 522/422
            const strategies = [
                { name: 'Proxy 1', url: `https://api.allorigins.win/get?url=${encodeURIComponent(rss)}&_=${Date.now()}`, type: 'wrapped' },
                { name: 'Proxy 2', url: `https://corsproxy.io/?${encodeURIComponent(rss)}`, type: 'direct' },
                { name: 'Proxy 3', url: `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rss)}`, type: 'json' }
            ];

            for (const s of strategies) {
                try {
                    console.log("Mencoba " + s.name);
                    const res = await fetch(s.url);
                    if (!res.ok) throw new Error();

                    let items = [];
                    if (s.type === 'wrapped') {
                        const data = await res.json();
                        const xml = new DOMParser().parseFromString(data.contents, "text/xml");
                        items = Array.from(xml.querySelectorAll("item")).map(i => ({
                            title: i.querySelector("title").textContent,
                            link: i.querySelector("link").textContent
                        }));
                    } else if (s.type === 'direct') {
                        const text = await res.text();
                        const xml = new DOMParser().parseFromString(text, "text/xml");
                        items = Array.from(xml.querySelectorAll("item")).map(i => ({
                            title: i.querySelector("title").textContent,
                            link: i.querySelector("link").textContent
                        }));
                    } else {
                        const data = await res.json();
                        items = data.items;
                    }

                    if (items.length > 0) {
                        feed.innerHTML = "";
                        items.slice(0, 9).forEach(it => {
                            feed.innerHTML += `<div class="card" onclick="window.open('${it.link}', '_blank')">
                                <small style="color:var(--blue)">ANTARA</small>
                                <h3>${it.title}</h3>
                            </div>`;
                        });
                        return; // Berhenti jika satu proxy berhasil
                    }
                } catch (e) {
                    console.warn(s.name + " gagal, mencoba jalur lain...");
                }
            }

            feed.innerHTML = `<div class="status-box">
                <p>Semua jalur macet (Error 520/522). Coba lagi nanti.</p>
                <button class="btn-retry" onclick="smartFetch()">MUAT ULANG</button>
            </div>`;
        }
    </script>
</body>
</html>
