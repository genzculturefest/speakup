<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KF+ | Super-App Agregator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    <style>
        :root {
            --primary-red: #ed1c24;
            --primary-blue: #00aeef;
            --bg-dark: #0f0f0f;
            --card-bg: #1e1e1e;
            --text-gray: #b0b0b0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* --- NAVBAR --- */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 5%;
            background: #000;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #333;
        }

        .brand { font-size: 26px; font-weight: 900; cursor: pointer; }
        .brand span { color: var(--primary-red); }
        .brand i { color: var(--primary-blue); font-style: normal; }

        .menu { display: flex; gap: 20px; }
        .menu a {
            color: var(--text-gray);
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        .menu a:hover, .menu a.active { color: white; border-bottom: 2px solid var(--primary-red); }

        /* --- CONTAINER --- */
        .container { padding: 30px 5%; min-height: 100vh; }
        .page { display: none; }
        .page.active { display: block; }

        h2 { font-size: 24px; border-left: 5px solid var(--primary-red); padding-left: 15px; margin-bottom: 25px; }

        /* --- GRID & CARDS --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333;
            transition: 0.3s;
            cursor: pointer;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--primary-blue); }
        .card-body { padding: 15px; }
        .card-body h3 { font-size: 15px; margin: 0 0 10px 0; line-height: 1.4; color: #fff; }

        .status-box { grid-column: 1/-1; text-align: center; padding: 50px; color: var(--text-gray); }
        .btn-retry { 
            background: var(--primary-red); color: white; border: none; 
            padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px;
        }
    </style>
</head>
<body>

    <nav>
        <div class="brand" onclick="showPage('home')">KF<span>+</span><i>!</i></div>
        <div class="menu">
            <a onclick="showPage('home')" id="btn-home" class="active">HOME</a>
            <a onclick="showPage('news')" id="btn-news">NEWS+</a>
            <a onclick="showPage('games')" id="btn-games">GAMES+</a>
            <a onclick="showPage('shop')" id="btn-shop">SHOP+</a>
            <a onclick="showPage('film')" id="btn-film">FILM+</a>
        </div>
    </nav>

    <div class="container">
        
        <section id="home" class="page active">
            <div style="background: linear-gradient(135deg, #ed1c24, #00aeef); padding: 50px; border-radius: 15px; text-align: center;">
                <h1>Selamat Datang di KF+</h1>
                <p>Portal Agregator Mahasiswa Global Institute</p>
            </div>
        </section>

        <section id="news" class="page">
            <h2>Berita Terkini (Antara News)</h2>
            <div id="news-feed" class="grid">
                <div class="status-box">Memuat berita...</div>
            </div>
        </section>

        <section id="games" class="page">
            <h2>Games+</h2>
            <div class="grid">
                <div class="card"><div class="card-body"><h3>Classic Bowling</h3></div></div>
                <div class="card"><div class="card-body"><h3>Retro Speed</h3></div></div>
            </div>
        </section>

        <section id="shop" class="page">
            <h2>Shop+</h2>
            <p>Cari produk gadget dan hobi favoritmu.</p>
        </section>

        <section id="film" class="page">
            <h2>Film+</h2>
            <div class="grid">
                <div class="card"><div class="card-body"><h3>Dokumenter Baduy</h3></div></div>
            </div>
        </section>

    </div>

    <script>
        // FUNGSI NAVIGASI
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.menu a').forEach(a => a.classList.remove('active'));
            
            document.getElementById(pageId).classList.add('active');
            document.getElementById('btn-' + pageId).classList.add('active');

            if(pageId === 'news') fetchNews();
        }

        // LOGIKA FETCH BERITA (MENGGUNAKAN KODE KAMU)
        async function fetchNews() {
            const feed = document.getElementById('news-feed');
            feed.innerHTML = '<div class="status-box">Sedang mengambil data...</div>';

            try {
                const targetUrl = 'https://www.antaranews.com/rss/terpopuler.xml';
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;

                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error(`Proxy error: ${response.status}`);

                const json = await response.json();
                const xmlText = json.contents; // Mengambil data dari property .contents

                const xmlDoc = new DOMParser().parseFromString(xmlText, "text/xml");
                const items = xmlDoc.querySelectorAll("item");

                if(items.length > 0) {
                    renderNews(items);
                } else {
                    throw new Error("Berita tidak ditemukan");
                }
            } catch (err) {
                console.error(err);
                feed.innerHTML = `
                    <div class="status-box">
                        <p>Gagal memproses berita secara real-time.</p>
                        <button class="btn-retry" onclick="fetchNews()">MUAT ULANG</button>
                    </div>`;
            }
        }

        function renderNews(items) {
            const feed = document.getElementById('news-feed');
            feed.innerHTML = "";
            items.forEach((item, i) => {
                if(i < 9) {
                    const title = item.querySelector("title").textContent;
                    const link = item.querySelector("link").textContent;
                    feed.innerHTML += `
                        <div class="card" onclick="window.open('${link}', '_blank')">
                            <div class="card-body">
                                <small style="color:var(--primary-blue)">ANTARA NEWS</small>
                                <h3>${title}</h3>
                            </div>
                        </div>`;
                }
            });
        }
    </script>
</body>
</html>
