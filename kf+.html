<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KF+ | Agregator Global Institute</title>
    <style>
        :root { --red: #ed1c24; --blue: #00aeef; --bg: #0f0f0f; --card: #1e1e1e; --gray: #b0b0b0; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; }
        nav { display: flex; justify-content: space-between; padding: 15px 5%; background: #000; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 24px; font-weight: 900; cursor: pointer; }
        .logo span { color: var(--red); }
        .menu { display: flex; gap: 15px; }
        .menu a { color: var(--gray); text-decoration: none; font-size: 12px; font-weight: bold; cursor: pointer; }
        .menu a.active { color: white; border-bottom: 2px solid var(--red); }
        .container { padding: 25px 5%; min-height: 100vh; }
        .page { display: none; }
        .page.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #333; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--blue); transform: translateY(-3px); }
        .btn { background: var(--red); color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .status { text-align: center; padding: 40px; color: var(--gray); grid-column: 1/-1; }
    </style>
</head>
<body>

    <nav>
        <div class="logo" onclick="showPage('home')">KF<span>+</span></div>
        <div class="menu">
            <a onclick="showPage('home')" id="m-home" class="active">HOME</a>
            <a onclick="showPage('news')" id="m-news">NEWS+</a>
            <a onclick="showPage('games')" id="m-games">GAMES+</a>
            <a onclick="showPage('shop')" id="m-shop">SHOP+</a>
            <a onclick="showPage('film')" id="m-film">FILM+</a>
        </div>
    </nav>

    <div class="container">
        <section id="home" class="page active">
            <div style="background: linear-gradient(to right, var(--red), var(--blue)); padding: 60px; border-radius: 15px; text-align: center;">
                <h1>Selamat Datang di KF+</h1>
                <p>Platform Digital Mahasiswa Global Institute</p>
            </div>
        </section>

        <section id="news" class="page">
            <h2 style="border-left: 4px solid var(--red); padding-left: 10px;">Berita Terkini</h2>
            <div id="news-feed" class="grid"><div class="status">Menunggu data...</div></div>
        </section>

        <section id="games" class="page">
            <h2>Games+</h2>
            <div class="grid">
                <div class="card" onclick="alert('Bowling Game segera hadir!')">
                    <h3 style="color:var(--blue)">Classic Bowling</h3>
                    <p>Mainkan sekarang di browser.</p>
                </div>
            </div>
        </section>

        <section id="shop" class="page">
            <h2>Shop+</h2>
            <div style="background:var(--card); padding:30px; border-radius:15px; text-align:center;">
                <input type="text" id="sk" placeholder="Cari barang di Shopee..." style="padding:10px; width:60%; border-radius:5px;">
                <button class="btn" onclick="window.open('https://shopee.co.id/search?keyword='+document.getElementById('sk').value)">CARI</button>
            </div>
        </section>

        <section id="film" class="page">
            <h2>Film+</h2>
            <div class="grid">
                <div class="card">
                    <h3>Dokumenter Baduy</h3>
                    <p style="color:var(--gray)">Tugas UAS On-Screen Personality.</p>
                </div>
            </div>
        </section>
    </div>

    <script>
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.menu a').forEach(a => a.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('m-' + id).classList.add('active');
            if(id === 'news') fetchNews();
            window.scrollTo(0,0);
        }

        async function fetchNews() {
            const feed = document.getElementById('news-feed');
            feed.innerHTML = '<div class="status">Menghubungkan ke jalur aman...</div>';

            try {
                // GANTI DENGAN URL GOOGLE SCRIPT TERBARU KAMU
                const proxyUrl = "https://script.google.com/macros/s/AKfycbyFRkZQ5wY2U0ZS_AdHZQZ1bupG2TFAZca6DTGnsDSrof5DhvBt0mh5XK_qbPPT6Sg7/exec";

                const response = await fetch(proxyUrl, { redirect: 'follow' });
                if (!response.ok) throw new Error("Gagal akses server.");

                const xmlText = await response.text();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, "text/xml");
                const items = xmlDoc.querySelectorAll("item");

                if (items.length > 0) {
                    feed.innerHTML = "";
                    items.forEach((item, i) => {
                        if (i < 9) {
                            const title = item.querySelector("title").textContent;
                            const link = item.querySelector("link").textContent;
                            feed.innerHTML += `
                                <div class="card" onclick="window.open('${link}', '_blank')">
                                    <small style="color:var(--blue)">ANTARA NEWS</small>
                                    <h3 style="margin-top:10px;">${title}</h3>
                                </div>`;
                        }
                    });
                } else {
                    throw new Error("Data tidak terbaca. Pastikan URL Script benar.");
                }
            } catch (err) {
                feed.innerHTML = `<div class="status">
                    <p>Error: ${err.message}</p>
                    <button class="btn" onclick="fetchNews()">MUAT ULANG</button>
                </div>`;
            }
        }
    </script>
</body>
</html>
