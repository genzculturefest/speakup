<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KF+ | Agregator Berita</title>
    <style>
        :root { --red: #ed1c24; --blue: #00aeef; --bg: #0f0f0f; --card: #1e1e1e; --text: #b0b0b0; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; }
        nav { display: flex; justify-content: space-between; padding: 15px 5%; background: #000; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 24px; font-weight: 900; cursor: pointer; }
        .logo span { color: var(--red); }
        .logo i { color: var(--blue); font-style: normal; }
        .menu { display: flex; gap: 20px; }
        .menu a { color: var(--text); text-decoration: none; font-size: 13px; font-weight: 700; cursor: pointer; }
        .menu a.active { color: white; border-bottom: 2px solid var(--red); }
        .container { padding: 30px 5%; min-height: 100vh; }
        .page { display: none; }
        .page.active { display: block; }
        h2 { border-left: 5px solid var(--red); padding-left: 15px; margin-bottom: 25px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid #333; transition: 0.3s; cursor: pointer; }
        .card:hover { transform: translateY(-5px); border-color: var(--blue); }
        .status-box { text-align: center; padding: 50px; color: var(--text); grid-column: 1/-1; }
        .btn-red { background: var(--red); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <nav>
        <div class="logo" onclick="showPage('home')">KF<span>+</span><i>!</i></div>
        <div class="menu">
            <a onclick="showPage('home')" id="m-home" class="active">HOME</a>
            <a onclick="showPage('news')" id="m-news">NEWS+</a>
            <a onclick="showPage('games')" id="m-games">GAMES+</a>
            <a onclick="showPage('shop')" id="m-shop">SHOP+</a>
            <a onclick="showPage('film')" id="m-film">FILM+</a>
        </div>
    </nav>

    <div class="container">
        <section id="home" class="page active">
            <div style="background: linear-gradient(135deg, var(--red), var(--blue)); padding: 60px; border-radius: 20px; text-align: center;">
                <h1>Selamat Datang di KF+</h1>
                <p>Portal Agregator Mahasiswa Global Institute</p>
            </div>
        </section>

        <section id="news" class="page">
            <h2>Berita Terkini (Antara News)</h2>
            <div id="news-feed" class="grid">
                <div class="status-box">Memuat berita menggunakan AllOrigins...</div>
            </div>
        </section>

        <section id="games" class="page"><h2>Games+</h2><p>Segera hadir.</p></section>
        <section id="shop" class="page"><h2>Shop+</h2><p>Katalog belanja mahasiswa.</p></section>
        <section id="film" class="page"><h2>Film+</h2><p>Dokumenter dan tugas kuliah.</p></section>
    </div>

    <script>
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.menu a').forEach(a => a.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('m-' + id).classList.add('active');
            if(id === 'news') loadNews();
        }

        async function loadNews() {
            const feed = document.getElementById('news-feed');
            feed.innerHTML = '<div class="status-box">Sedang mengambil data...</div>';

            try {
                // Menggunakan logika terbaru kamu dengan anti-cache
                const targetUrl = encodeURIComponent('https://www.antaranews.com/rss/terpopuler.xml');
                const proxyUrl = `https://api.allorigins.win/get?url=${targetUrl}&_=${Date.now()}`;

                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error('Proxy down');

                const data = await response.json();
                const xmlText = data.contents; // AllOrigins membungkus XML di sini

                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, "text/xml");
                const items = xmlDoc.querySelectorAll("item");

                if (items.length === 0) throw new Error('Data kosong');

                feed.innerHTML = "";
                items.forEach((item, i) => {
                    if (i < 10) {
                        const title = item.querySelector("title").textContent;
                        const link = item.querySelector("link").textContent;
                        feed.innerHTML += `
                            <div class="card" onclick="window.open('${link}', '_blank')">
                                <small style="color:var(--blue)">BERITA</small>
                                <h3 style="margin: 10px 0 0 0; font-size: 16px;">${title}</h3>
                            </div>`;
                    }
                });

            } catch (err) {
                console.error(err);
                feed.innerHTML = `
                    <div class="status-box">
                        <p>Gagal memproses berita secara real-time.</p>
                        <button class="btn-red" onclick="loadNews()">MUAT ULANG</button>
                    </div>`;
            }
        }
    </script>
</body>
</html>
